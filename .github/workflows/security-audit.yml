name: Security audit

# Dependency vulnerability scanning, kept separate from the release pipeline so
# an advisory never blocks a tagged build. Runs on dependency changes, on a
# weekly schedule (new advisories land against unchanged code), and on demand.
on:
    push:
        branches: [master]
        paths:
            - package.json
            - package-lock.json
            - src-tauri/Cargo.toml
            - src-tauri/Cargo.lock
            - .github/workflows/security-audit.yml
    pull_request:
        paths:
            - package.json
            - package-lock.json
            - src-tauri/Cargo.toml
            - src-tauri/Cargo.lock
            - .github/workflows/security-audit.yml
    schedule:
        - cron: '0 6 * * 1'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    npm-audit:
        name: npm audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Setup Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
              with:
                  node-version: '22'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Audit npm dependencies
              run: npm audit --audit-level=high

    cargo-audit:
        name: cargo audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
              with:
                  toolchain: stable

            - name: Install cargo-audit
              run: cargo install cargo-audit --locked

            - name: Audit Rust dependencies
              run: cargo audit --file src-tauri/Cargo.lock
