name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build-release:
        name: Build & publish Windows x64 installer
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - name: Install dependencies
              run: npm ci

            - name: Verify release version
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-version.ps1 -Tag "${{ github.ref_name }}"

            - name: Run frontend tests
              run: npm test

            - name: Build frontend
              run: npm run build

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml

            # Keep the release in draft until latest.json is normalized and verified.
            - name: Build, sign & create draft release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Windows Apps ${{ github.ref_name }}'
                  releaseBody: |
                      Windows Apps is a fast, private application catalog and launcher for Windows 10 and 11.

                      ## Highlights

                      - Cleaner catalog - runtimes, helpers, services, language servers, documentation, and installers are separated using explainable source and metadata signals.
                      - Stable user choices - auxiliary tools can be restored permanently, hidden, or moved back without losing their canonical identity.
                      - More reliable maintenance - overlapping scans and updater actions are coalesced, cache backups recover interrupted writes, and icon maintenance stays separate from full scanning.
                      - Better identity matching - quoted browser profiles, normalized Windows paths, ProductName, and OriginalFilename improve deduplication without merging distinct portable copies.
                  releaseDraft: true
                  prerelease: false

            - name: Download draft release assets
              shell: pwsh
              run: gh release download "${{ github.ref_name }}" --dir release-assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Prepare updater manifest
              shell: pwsh
              run: powershell -NoProfile -File scripts/prepare-release-manifest.ps1 -AssetsDir release-assets -Tag "${{ github.ref_name }}"

            - name: Verify release assets
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-assets.ps1 -AssetsDir release-assets -Tag "${{ github.ref_name }}"

            - name: Replace manifest and publish release
              shell: pwsh
              run: |
                  gh release upload "${{ github.ref_name }}" release-assets/latest.json --clobber
                  gh release edit "${{ github.ref_name }}" --draft=false
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
