name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build-release:
        name: Build & publish Windows x64 installer
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Setup Node.js
              uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
              with:
                  node-version: '22'
                  cache: npm

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
              with:
                  toolchain: stable
                  targets: x86_64-pc-windows-msvc

            - name: Install dependencies
              run: npm ci

            - name: Verify release version
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-version.ps1 -Tag "${{ github.ref_name }}"

            - name: Verify release notes
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-notes.ps1 -Path Release.md -Tag "${{ github.ref_name }}"

            - name: Lint frontend
              run: npm run lint

            - name: Run frontend tests
              run: npm test

            - name: Type-check frontend
              run: npm run typecheck

            - name: Build frontend
              run: npm run build

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml

            - name: Check Rust formatting
              run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

            - name: Lint Rust
              run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

            # Keep the release in draft until latest.json is normalized and verified.
            - name: Build, sign & create draft release
              uses: tauri-apps/tauri-action@42e9df6c59070d114bf90dcd3943a1b8f138b113 # v0.5.20
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Windows Apps ${{ github.ref_name }}'
                  releaseDraft: true
                  prerelease: false

            - name: Apply release notes
              shell: pwsh
              run: gh release edit "${{ github.ref_name }}" --notes-file Release.md
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Download draft release assets
              shell: pwsh
              run: gh release download "${{ github.ref_name }}" --dir release-assets
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Prepare updater manifest
              shell: pwsh
              run: powershell -NoProfile -File scripts/prepare-release-manifest.ps1 -AssetsDir release-assets -Tag "${{ github.ref_name }}"

            - name: Verify release assets
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-assets.ps1 -AssetsDir release-assets -Tag "${{ github.ref_name }}"

            - name: Replace manifest and publish release
              shell: pwsh
              run: |
                  gh release upload "${{ github.ref_name }}" release-assets/latest.json --clobber
                  gh release edit "${{ github.ref_name }}" --draft=false
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
