name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

jobs:
    build-release:
        name: Build & publish Windows x64 installer
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: npm

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-pc-windows-msvc

            - name: Install dependencies
              run: npm ci

            - name: Verify release version
              shell: pwsh
              run: powershell -NoProfile -File scripts/verify-release-version.ps1 -Tag "${{ github.ref_name }}"

            - name: Run frontend tests
              run: npm test -- --run

            - name: Run Rust tests
              run: cargo test --manifest-path src-tauri/Cargo.toml

            # tauri-action builds the app, signs the update artifacts with the private key,
            # generates latest.json (the updater manifest), creates the GitHub Release for the
            # tag, and uploads the installer + latest.json + .sig as release assets.
            - name: Build, sign & publish release
              uses: tauri-apps/tauri-action@v0
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: 'Windows Apps ${{ github.ref_name }}'
                  releaseBody: 'Install the latest version. Existing installs update automatically.'
                  releaseDraft: false
                  prerelease: false
