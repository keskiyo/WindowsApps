version: 2
updates:
    # Keep the SHA-pinned GitHub Actions current with deliberate, reviewable PRs.
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      commit-message:
          prefix: ci

    # Frontend dependencies (package.json / package-lock.json at the repo root).
    - package-ecosystem: npm
      directory: /
      schedule:
          interval: weekly
      commit-message:
          prefix: deps
      groups:
          npm-minor-patch:
              update-types:
                  - minor
                  - patch

    # Rust backend dependencies (src-tauri/Cargo.toml).
    - package-ecosystem: cargo
      directory: /src-tauri
      schedule:
          interval: weekly
      commit-message:
          prefix: deps
      groups:
          cargo-minor-patch:
              update-types:
                  - minor
                  - patch
